services:
  - type: web
    name: muleengine-backend
    runtime: python
    pythonVersion: 3.10.13
    buildCommand: python -m pip install --upgrade pip setuptools && python -m pip install --no-cache-dir -r src/backend/requirements.txt
    startCommand: cd src/backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: LOG_LEVEL
        value: info

  - type: web
    name: muleengine-frontend
    runtime: node
    nodeVersion: 18.19.0
    buildCommand: cd src/frontend && npm install && npm run build
    startCommand: cd src/frontend && npx serve -s build -l 3000
    envVars:
      - key: REACT_APP_API_URL
        value: https://muleengine-backend.onrender.com
      - key: CI
        value: false
